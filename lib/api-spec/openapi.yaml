    delete:
      operationId: deleteMarketplaceListing
      tags: [marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /digital-products:
    get:
      operationId: listDigitalProducts
      tags: [marketplace]
      parameters:
        - name: status
          in: query
          description: Filter by product status. Defaults to "active". Use "archived" to see archived products (sellers/admins only).
          schema:
            type: string
            enum: [active, archived]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DigitalProduct"
    post:
      operationId: createDigitalProduct
      tags: [marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProduct"
  /digital-products/{id}:
    patch:
      operationId: updateDigitalProduct
      tags: [marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProduct"
    delete:
      operationId: deleteDigitalProduct
      tags: [marketplace]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /digital-products/{id}/checkout:
    post:
      operationId: checkoutDigitalProduct
      tags: [marketplace]
      description: >
        Creates a real Stripe Checkout session for the product (open to guests and
        members alike). Members get an automatic 10% discount.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalProductCheckoutInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalProductCheckoutSession"
        "404":
          description: >
            Product does not exist, or exists but is not active. Both cases return
            404 (rather than a distinct code for "exists but archived") so this
            public, unauthenticated endpoint can't be used to enumerate product IDs
            by comparing status codes.
        "409":
          description: Product isn't ready for purchase yet (no Stripe price configured)
  /digital-products/{id}/purchase:
    post:
      operationId: purchaseDigitalProduct
      tags: [marketplace]
      description: >
        Legacy member-only purchase confirmation (no real payment). Distinct from
        POST /digital-products/{id}/checkout, which creates a real Stripe Checkout
        session and is open to guests.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseReceipt"
        "410":
          description: Product is no longer available
  /ads:
    get:
      operationId: listAds
      tags: [marketplace]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
