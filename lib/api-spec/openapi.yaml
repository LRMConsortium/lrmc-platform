openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LRMC / Ususu institution API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
  - name: memberships
  - name: property-listings
  - name: land
  - name: construction
  - name: mobility
  - name: marketplace
  - name: youth
  - name: prospecting
  - name: treasury
  - name: risk
  - name: settlement
  - name: internal
  - name: dashboard
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------------- AUTH ----------------
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "204":
          description: Logged out
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid, expired, or used token
  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationInput"
      responses:
        "200":
          description: If the account exists and is unverified, a new email was sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: If the account exists, a reset email was sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid, expired, or used token

  # ---------------- MEMBERSHIPS ----------------
  /memberships:
    get:
      operationId: listMemberships
      tags: [memberships]
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Membership"
    post:
      operationId: createMembership
      tags: [memberships]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
  /memberships/me:
    get:
      operationId: getMyMembership
      tags: [memberships]
      responses:
        "200":
          description: My membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "404":
          description: No membership found
  /memberships/{id}:
    patch:
      operationId: updateMembership
      tags: [memberships]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
  /memberships/{id}/checkout:
    post:
      operationId: checkoutMembership
      tags: [memberships]
      description: >
        Creates a Stripe Checkout session for the membership's application fee.
        Owner-only. Free tiers have nothing to charge, so this returns 409 for
        memberships that are already paid.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipCheckoutInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipCheckoutSession"
        "403":
          description: Not the membership owner
        "404":
          description: Membership not found
        "409":
          description: Membership fee already paid
  /memberships/{id}/kyc:
    post:
      operationId: submitMembershipKyc
      tags: [memberships]
      description: >
        Owner-only. Submits (or resubmits after rejection) the member's KYC
        details. Fails until the membership fee has been paid.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipKycSubmission"
      responses:
        "200":
          description: KYC submitted, now pending admin review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "403":
          description: Not the membership owner
        "404":
          description: Membership not found
        "409":
          description: Membership fee not paid yet
    patch:
      operationId: reviewMembershipKyc
      tags: [memberships]
      description: Admin-only. Approves or rejects a member's pending KYC submission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipKycReview"
      responses:
        "200":
          description: KYC reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "404":
          description: Membership not found
        "409":
          description: No pending KYC submission to review

  # ---------------- PROPERTY LISTINGS ----------------
  /property-listings:
