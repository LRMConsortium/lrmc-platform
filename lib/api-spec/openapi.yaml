                type: array
                items:
                  $ref: "#/components/schemas/LiquiditySnapshot"
  /treasury/currency-rates:
    get:
      operationId: listCurrencyRates
      tags: [treasury]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CurrencyRate"
  /treasury/summary:
    get:
      operationId: getTreasurySummary
      tags: [treasury]
      responses:
        "200":
          description: Treasury dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreasurySummary"

  # ---------------- RISK ----------------
  /risk-events:
    get:
      operationId: listRiskEvents
      tags: [risk]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiskEvent"
  /risk-events/{id}:
    patch:
      operationId: updateRiskEvent
      tags: [risk]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskEventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskEvent"

  # ---------------- SETTLEMENT ----------------
  /settlement-obligations:
    get:
      operationId: listSettlementObligations
      tags: [settlement]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SettlementObligation"
  /settlement-obligations/{id}:
    patch:
      operationId: updateSettlementObligation
      tags: [settlement]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementObligationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementObligation"

  # ---------------- INTERNAL MESSAGING / TICKETING ----------------
  /internal-messages:
    get:
      operationId: listInternalMessages
      tags: [internal]
      responses:
        "200":
          description: Inbox and sent for current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InternalMessage"
    post:
      operationId: createInternalMessage
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalMessage"
  /internal-messages/{id}/read:
    patch:
      operationId: markInternalMessageRead
      tags: [internal]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalMessage"
  /internal-tickets:
    get:
      operationId: listInternalTickets
      tags: [internal]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InternalTicket"
    post:
      operationId: createInternalTicket
      tags: [internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalTicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalTicket"
  /internal-tickets/{id}:
    patch:
      operationId: updateInternalTicket
      tags: [internal]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalTicketUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalTicket"

  # ---------------- DASHBOARDS ----------------
  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Admin dashboard aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"
  /dashboard/member:
    get:
      operationId: getMemberDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Member dashboard aggregate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDashboard"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ---------- AUTH ----------
    User:
      type: object
      required: [id, email, fullName, phone, role, emailVerified, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        phone: { type: string }
        role: { type: string }
        emailVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
    RegisterInput:
      type: object
      required: [email, password, fullName, phone]
      properties:
        email: { type: string, minLength: 3 }
        password: { type: string, minLength: 6 }
        fullName: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, minLength: 3 }
        password: { type: string }
    VerifyEmailInput:
      type: object
      required: [token]
      properties:
        token: { type: string, minLength: 1 }
    ResendVerificationInput:
      type: object
      required: [email]
      properties:
        email: { type: string, minLength: 3 }
    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email: { type: string, minLength: 3 }
    ResetPasswordInput:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 1 }
        password: { type: string, minLength: 6 }
    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    # ---------- MEMBERSHIPS ----------
    Membership:
      type: object
      required: [id, userId, type, feePaidCents, status, paymentStatus, kycStatus, createdAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        type: { type: string }
        feePaidCents: { type: integer }
        status: { type: string }
        paymentStatus: { type: string, enum: [unpaid, paid] }
        kycStatus: { type: string, enum: [not_submitted, pending, approved, rejected] }
        kycFullName: { type: string, nullable: true }
        kycIdType: { type: string, nullable: true }
        kycIdNumber: { type: string, nullable: true }
        kycNotes: { type: string, nullable: true }
        kycSubmittedAt: { type: string, format: date-time, nullable: true }
        kycReviewedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    MembershipInput:
      type: object
      required: [type]
      properties:
        type: { type: string }
    MembershipStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, active, rejected, suspended] }
    MembershipCheckoutInput:
      type: object
      required: [buyerEmail]
      properties:
        buyerEmail:
          type: string
          minLength: 3
          pattern: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
          description: Address the Stripe receipt is sent to.
    MembershipCheckoutSession:
      type: object
      required: [checkoutUrl]
      properties:
        checkoutUrl:
          type: string
          description: Stripe-hosted checkout URL to redirect the member to.
    MembershipKycSubmission:
      type: object
      required: [fullName, idType, idNumber]
      properties:
        fullName: { type: string, minLength: 2 }
        idType: { type: string, minLength: 2 }
        idNumber: { type: string, minLength: 2 }
    MembershipKycReview:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [approve, reject] }
        notes: { type: string }

    # ---------- PROPERTY LISTINGS ----------
    PropertyListing:
      type: object
      required: [id, ownerId, category, title, location, priceCents, status, createdAt]
      properties:
        id: { type: integer }
        ownerId: { type: integer }
        category: { type: string }
        title: { type: string }
        location: { type: string }
        priceCents: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    PropertyListingInput:
      type: object
      required: [category, title, location, priceCents]
      properties:
        category: { type: string }
        title: { type: string, minLength: 1 }
        location: { type: string, minLength: 1 }
        priceCents: { type: integer, minimum: 1 }
    PropertyListingUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        location: { type: string, minLength: 1 }
        priceCents: { type: integer, minimum: 1 }
        status: { type: string, enum: [active, rented, inactive] }

    # ---------- LAND ----------
    LandListing:
      type: object
      required: [id, sellerId, title, location, priceCents, sizeAcres, status, createdAt]
      properties:
        id: { type: integer }
        sellerId: { type: integer }
        title: { type: string }
        location: { type: string }
        priceCents: { type: integer }
        sizeAcres: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    LandListingInput:
      type: object
      required: [title, location, priceCents, sizeAcres]
      properties:
        title: { type: string, minLength: 1 }
        location: { type: string, minLength: 1 }
        priceCents: { type: integer, minimum: 1 }
        sizeAcres: { type: integer, minimum: 0 }
    LandListingUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        location: { type: string, minLength: 1 }
        priceCents: { type: integer, minimum: 1 }
        sizeAcres: { type: integer, minimum: 0 }
        status: { type: string, enum: [available, under_contract, sold] }
    LandTransaction:
      type: object
      required: [id, listingId, buyerId, amountCents, status, createdAt]
      properties:
        id: { type: integer }
        listingId: { type: integer }
        buyerId: { type: integer }
        amountCents: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    LandTransactionInput:
      type: object
      required: [listingId]
      properties:
        listingId: { type: integer }

    # ---------- CONSTRUCTION ----------
    ConstructionContractor:
      type: object
      required: [id, userId, companyName, specialty, rating, createdAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        companyName: { type: string }
        specialty: { type: string }
        rating: { type: integer }
        createdAt: { type: string, format: date-time }
    ConstructionContractorInput:
      type: object
      required: [companyName, specialty]
      properties:
        companyName: { type: string, minLength: 1 }
        specialty: { type: string, minLength: 1 }
    ConstructionProject:
      type: object
      required: [id, contractorId, title, location, budgetCents, status, createdAt]
      properties:
        id: { type: integer }
        contractorId: { type: integer }
        title: { type: string }
        location: { type: string }
        budgetCents: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    ConstructionProjectInput:
      type: object
      required: [contractorId, title, location, budgetCents]
      properties:
        contractorId: { type: integer }
        title: { type: string, minLength: 1 }
        location: { type: string, minLength: 1 }
        budgetCents: { type: integer, minimum: 1 }
    ConstructionProjectUpdate:
      type: object
      properties:
        status: { type: string, enum: [planning, in_progress, completed, on_hold] }
        budgetCents: { type: integer, minimum: 1 }

    # ---------- MOBILITY ----------
    Driver:
      type: object
      required: [id, userId, vehicleInfo, status, rating, createdAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        vehicleInfo: { type: string }
        status: { type: string }
        rating: { type: integer }
        createdAt: { type: string, format: date-time }
    DriverInput:
      type: object
      required: [vehicleInfo]
      properties:
        vehicleInfo: { type: string, minLength: 1 }
    DriverStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, approved, suspended] }
    Ride:
      type: object
      required: [id, riderId, driverId, pickup, dropoff, fareCents, status, createdAt]
      properties:
        id: { type: integer }
        riderId: { type: integer }
        driverId: { type: ["integer", "null"] }
        pickup: { type: string }
        dropoff: { type: string }
        fareCents: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    RideInput:
      type: object
      required: [pickup, dropoff, fareCents]
      properties:
        pickup: { type: string, minLength: 1 }
        dropoff: { type: string, minLength: 1 }
        fareCents: { type: integer, minimum: 1 }
    RideUpdate:
      type: object
      properties:
        status: { type: string, enum: [requested, accepted, in_progress, completed, cancelled] }
        driverId: { type: ["integer", "null"] }

    # ---------- MARKETPLACE ----------
    MarketplaceListing:
      type: object
      required: [id, sellerId, title, description, priceCents, category, status, createdAt]
      properties:
        id: { type: integer }
        sellerId: { type: integer }
        title: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        category: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    MarketplaceListingInput:
      type: object
      required: [title, description, priceCents, category]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        priceCents: { type: integer, minimum: 0 }
        category: { type: string, minLength: 1 }
    MarketplaceListingUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        priceCents: { type: integer, minimum: 0 }
        status: { type: string, enum: [active, sold, inactive] }
    DigitalProduct:
      type: object
      required: [id, title, description, priceCents, category, status, createdAt]
      properties:
        id: { type: integer }
        sellerId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: string }
        priceCents: { type: integer }
        category: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    DigitalProductInput:
      type: object
      required: [title, description, priceCents, category]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        priceCents: { type: integer, minimum: 1 }
        category: { type: string, minLength: 1 }
        fileUrl:
          type: string
          minLength: 1
          pattern: "^https://"
          description: Link to the hosted deliverable (e.g. a PDF) emailed to buyers after payment. Must be an https:// URL.
    DigitalProductUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        priceCents: { type: integer, minimum: 1 }
        category: { type: string, minLength: 1 }
        status: { type: string, enum: [active, archived] }
        fileUrl:
          type: string
          minLength: 1
          pattern: "^https://"
          description: Link to the hosted deliverable (e.g. a PDF) emailed to buyers after payment. Must be an https:// URL.
    DigitalProductCheckoutInput:
      type: object
      required: [buyerEmail]
      properties:
        buyerEmail:
          type: string
          minLength: 3
          pattern: "^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$"
          description: Address the receipt and download link are sent to.
    DigitalProductCheckoutSession:
      type: object
      required: [checkoutUrl]
      properties:
        checkoutUrl:
          type: string
          description: Stripe-hosted checkout URL to redirect the buyer to.
    PurchaseReceipt:
      type: object
      required: [productId, amountCents, message]
      properties:
        productId: { type: integer }
        amountCents: { type: integer }
        message: { type: string }
    Ad:
      type: object
      required: [id, advertiserId, title, content, placement, status, createdAt]
      properties:
        id: { type: integer }
        advertiserId: { type: integer }
        title: { type: string }
        content: { type: string }
        placement: { type: string }
        status: { type: string }
        parentAdId: { type: integer, nullable: true }
        rejectionNote: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    AdRejectionChainItem:
      type: object
      required: [id, status, title, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    AdDetail:
      type: object
      required: [id, advertiserId, title, content, placement, status, createdAt]
      properties:
        id: { type: integer }
        advertiserId: { type: integer }
        title: { type: string }
        content: { type: string }
        placement: { type: string }
        status: { type: string }
        parentAdId: { type: integer, nullable: true }
        rejectionNote: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        rejectionChain:
          type: array
          description: Full ancestor rejection chain, newest first. Admins only.
          items:
            $ref: "#/components/schemas/AdRejectionChainItem"
    AdInput:
      type: object
      required: [title, content, placement]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string, minLength: 1 }
        placement: { type: string, minLength: 1 }
        replacesAdId: { type: integer }
    AdStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, active, rejected] }
    AdContentUpdate:
      type: object
      description: Fields a seller can edit on their own pending ad. status and rejectionNote are admin-only on write and constrained to known values.
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string, minLength: 1 }
        placement: { type: string, minLength: 1 }
        status: { type: string, enum: [pending, active, rejected] }
        rejectionNote: { type: string, nullable: true }

    # ---------- YOUTH ----------
    YouthEmploymentRecord:
      type: object
      required: [id, userId, program, status, placementCompany, createdAt]
      properties:
        id: { type: integer }
        userId: { type: integer }
        program: { type: string }
        status: { type: string }
        placementCompany: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    YouthEmploymentRecordInput:
      type: object
      required: [program]
      properties:
        program: { type: string, minLength: 1 }
        placementCompany: { type: string }
    YouthEmploymentRecordUpdate:
      type: object
      properties:
        status:
          {
            type: string,
            enum: [enrolled, training, placed, completed],
          }
        placementCompany: { type: string }

    # ---------- PROSPECTING ----------
    ProspectLead:
      type: object
      required: [id, name, contact, sector, status, notes, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        contact: { type: string }
        sector: { type: string }
        status: { type: string }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
    ProspectLeadInput:
      type: object
      required: [name, contact, sector]
      properties:
        name: { type: string, minLength: 1 }
        contact: { type: string, minLength: 1 }
        sector: { type: string, minLength: 1 }
        notes: { type: string }
    ProspectLeadUpdate:
      type: object
      properties:
        status:
          {
            type: string,
            enum: [new, contacted, qualified, converted, lost],
          }
        notes: { type: string }

    # ---------- TREASURY ----------
    TreasuryAccount:
      type: object
      required: [id, name, currency, balanceCents, type, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        currency: { type: string }
        balanceCents: { type: integer }
        type: { type: string }
        updatedAt: { type: string, format: date-time }
    TreasuryTransaction:
      type: object
      required: [id, accountId, type, amountCents, description, createdAt]
      properties:
        id: { type: integer }
        accountId: { type: integer }
        type: { type: string }
        amountCents: { type: integer }
        description: { type: string }
        createdAt: { type: string, format: date-time }
    LiquiditySnapshot:
      type: object
      required: [id, totalUsdCents, totalGmdCents, reserveRatio, createdAt]
      properties:
        id: { type: integer }
        totalUsdCents: { type: integer }
        totalGmdCents: { type: integer }
        reserveRatio: { type: number }
        createdAt: { type: string, format: date-time }
    CurrencyRate:
      type: object
      required: [id, base, quote, rate, updatedAt]
      properties:
        id: { type: integer }
        base: { type: string }
        quote: { type: string }
        rate: { type: number }
        updatedAt: { type: string, format: date-time }
    TreasurySummary:
      type: object
      required:
        [
          totalUsdReservesCents,
          totalGmdOperationalCents,
          reserveRatio,
          latestRate,
          openRiskEvents,
          pendingSettlementsCents,
          recentTransactions,
        ]
      properties:
        totalUsdReservesCents: { type: integer }
        totalGmdOperationalCents: { type: integer }
        reserveRatio: { type: number }
        latestRate: { $ref: "#/components/schemas/CurrencyRate" }
        openRiskEvents: { type: integer }
        pendingSettlementsCents: { type: integer }
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/TreasuryTransaction"

    # ---------- RISK ----------
    RiskEvent:
      type: object
      required: [id, severity, category, description, status, createdAt]
      properties:
        id: { type: integer }
        severity: { type: string }
        category: { type: string }
        description: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    RiskEventUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [open, monitoring, resolved] }

    # ---------- SETTLEMENT ----------
    SettlementObligation:
      type: object
      required: [id, description, amountCents, dueDate, status, createdAt]
      properties:
        id: { type: integer }
        description: { type: string }
        amountCents: { type: integer }
        dueDate: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    SettlementObligationUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [pending, settled, overdue] }

    # ---------- INTERNAL ----------
    InternalMessage:
      type: object
      required: [id, senderId, recipientId, subject, body, readAt, createdAt]
      properties:
        id: { type: integer }
        senderId: { type: integer }
        recipientId: { type: integer }
        subject: { type: string }
        body: { type: string }
        readAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    InternalMessageInput:
      type: object
      required: [recipientId, subject, body]
      properties:
        recipientId: { type: integer }
        subject: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }
    InternalTicket:
      type: object
      required: [id, createdById, department, subject, description, status, priority, createdAt]
      properties:
        id: { type: integer }
        createdById: { type: integer }
        department: { type: string }
        subject: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        createdAt: { type: string, format: date-time }
    InternalTicketInput:
      type: object
      required: [department, subject, description, priority]
      properties:
        department: { type: string, minLength: 1 }
        subject: { type: string, minLength: 1 }
        description: { type: string, minLength: 1 }
        priority: { type: string, enum: [low, normal, high, urgent] }
    InternalTicketUpdate:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, resolved, closed] }
        priority: { type: string, enum: [low, normal, high, urgent] }

