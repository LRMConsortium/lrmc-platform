  # ---------------- MARKETPLACE / E-COMMERCE ----------------
  /marketplace-listings:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
