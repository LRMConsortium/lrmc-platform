    post:
      operationId: createPropertyListing
      tags: [property-listings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyListingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListing"
  /property-listings/{id}:
    patch:
      operationId: updatePropertyListing
      tags: [property-listings]
      parameters:
