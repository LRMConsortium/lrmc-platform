components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ---- Auth ----
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, role, phone]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
        role:
          type: string
        phone:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    ProfileUpdate:
      type: object
      properties:
        phone:
          type: string
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ---- Membership ----
    Membership:
      type: object
      required: [id, userId, type, status, feeDalasi, paidAt, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        type: { type: string }
        status: { type: string }
        feeDalasi: { type: integer }
        paidAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    MembershipInput:
      type: object
      required: [userId, type]
      properties:
        userId: { type: string }
        type: { type: string }
        feeDalasi: { type: integer }
    MembershipUpdate:
      type: object
      properties:
        status: { type: string }
        paidAt: { type: [string, 'null'], format: date-time }

    # ---- Assets ----
    Asset:
      type: object
      required: [id, ownerId, kind, title, description, location, priceDalasi, imageUrl, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        ownerId: { type: string }
        kind: { type: string }
        title: { type: string }
        description: { type: string }
        location: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: [string, 'null'] }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AssetInput:
      type: object
      required: [ownerId, kind, title]
      properties:
        ownerId: { type: string }
        kind: { type: string }
        title: { type: string, minLength: 1 }
        description: { type: string }
        location: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: string }
    AssetUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        location: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: string }
        status: { type: string }

    # ---- Land ----
    LandListing:
      type: object
      required: [id, sellerId, title, location, sizeAcres, priceUsd, description, imageUrl, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        sellerId: { type: string }
        title: { type: string }
        location: { type: string }
        sizeAcres: { type: integer }
        priceUsd: { type: integer }
        description: { type: string }
        imageUrl: { type: [string, 'null'] }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    LandListingInput:
      type: object
      required: [sellerId, title, location, sizeAcres, priceUsd]
      properties:
        sellerId: { type: string }
        title: { type: string, minLength: 1 }
        location: { type: string }
        sizeAcres: { type: integer }
        priceUsd: { type: integer }
        description: { type: string }
        imageUrl: { type: string }
    LandListingUpdate:
      type: object
      properties:
        title: { type: string }
        location: { type: string }
        sizeAcres: { type: integer }
        priceUsd: { type: integer }
        description: { type: string }
        imageUrl: { type: string }
        status: { type: string }
    LandTransaction:
      type: object
      required: [id, listingId, buyerId, amountUsd, status, closedAt, createdAt]
      properties:
        id: { type: integer }
        listingId: { type: integer }
        buyerId: { type: string }
        amountUsd: { type: integer }
        status: { type: string }
        closedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    LandTransactionInput:
      type: object
      required: [listingId, buyerId, amountUsd]
      properties:
        listingId: { type: integer }
        buyerId: { type: string }
        amountUsd: { type: integer }
    LandTransactionUpdate:
      type: object
      properties:
        status: { type: string }
        closedAt: { type: [string, 'null'], format: date-time }

    # ---- Construction ----
    ConstructionContractor:
      type: object
      required: [id, userId, companyName, specialty, licenseNumber, status, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        companyName: { type: string }
        specialty: { type: string }
        licenseNumber: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    ConstructionContractorInput:
      type: object
      required: [userId, companyName]
      properties:
        userId: { type: string }
        companyName: { type: string, minLength: 1 }
        specialty: { type: string }
        licenseNumber: { type: string }
    ConstructionContractorUpdate:
      type: object
      properties:
        status: { type: string }
        specialty: { type: string }
        licenseNumber: { type: string }
    ConstructionProject:
      type: object
      required: [id, contractorId, title, location, budgetUsd, status, startDate, endDate, createdAt]
      properties:
        id: { type: integer }
        contractorId: { type: integer }
        title: { type: string }
        location: { type: string }
        budgetUsd: { type: integer }
        status: { type: string }
        startDate: { type: [string, 'null'] }
        endDate: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    ConstructionProjectInput:
      type: object
      required: [contractorId, title]
      properties:
        contractorId: { type: integer }
        title: { type: string, minLength: 1 }
        location: { type: string }
        budgetUsd: { type: integer }
        startDate: { type: string }
        endDate: { type: string }
    ConstructionProjectUpdate:
      type: object
      properties:
        status: { type: string }
        budgetUsd: { type: integer }
        startDate: { type: string }
        endDate: { type: string }

    # ---- Ususu ----
    Driver:
      type: object
      required: [id, userId, vehicleInfo, licenseNumber, status, rating, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        vehicleInfo: { type: string }
        licenseNumber: { type: string }
        status: { type: string }
        rating: { type: number }
        createdAt: { type: string, format: date-time }
    DriverInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
        vehicleInfo: { type: string }
        licenseNumber: { type: string }
    DriverUpdate:
      type: object
      properties:
        status: { type: string }
        vehicleInfo: { type: string }
        licenseNumber: { type: string }
        rating: { type: number }
    Ride:
      type: object
      required: [id, riderId, driverId, pickup, dropoff, fareGmd, status, requestedAt, completedAt]
      properties:
        id: { type: integer }
        riderId: { type: string }
        driverId: { type: [integer, 'null'] }
        pickup: { type: string }
        dropoff: { type: string }
        fareGmd: { type: integer }
        status: { type: string }
        requestedAt: { type: string, format: date-time }
        completedAt: { type: [string, 'null'], format: date-time }
    RideInput:
      type: object
      required: [riderId, pickup, dropoff, fareGmd]
      properties:
        riderId: { type: string }
        pickup: { type: string, minLength: 1 }
        dropoff: { type: string, minLength: 1 }
        fareGmd: { type: integer }
    RideUpdate:
      type: object
      properties:
        driverId: { type: integer }
        status: { type: string }
        completedAt: { type: [string, 'null'], format: date-time }

    # ---- Payments ----
    Payment:
      type: object
      required: [id, userId, category, amount, currency, relatedId, status, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        category: { type: string }
        amount: { type: integer }
        currency: { type: string }
        relatedId: { type: [integer, 'null'] }
        status: { type: string }
        createdAt: { type: string, format: date-time }

    # ---- Ads ----
    Ad:
      type: object
      required: [id, advertiserId, title, description, placement, budgetUsd, status, createdAt]
      properties:
        id: { type: integer }
        advertiserId: { type: string }
        title: { type: string }
        description: { type: string }
        placement: { type: string }
        budgetUsd: { type: integer }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    AdInput:
      type: object
      required: [advertiserId, title]
      properties:
        advertiserId: { type: string }
        title: { type: string, minLength: 1 }
        description: { type: string }
        placement: { type: string }
        budgetUsd: { type: integer }
    AdUpdate:
      type: object
      properties:
        status: { type: string }
        budgetUsd: { type: integer }

    # ---- Marketplace ----
    MarketplaceListing:
      type: object
      required: [id, sellerId, title, description, category, priceDalasi, imageUrl, status, createdAt]
      properties:
        id: { type: integer }
        sellerId: { type: string }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: [string, 'null'] }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    MarketplaceListingInput:
      type: object
      required: [sellerId, title, priceDalasi]
      properties:
        sellerId: { type: string }
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: string }
    MarketplaceListingUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        category: { type: string }
        priceDalasi: { type: integer }
        imageUrl: { type: string }
        status: { type: string }

    # ---- E-commerce ----
    DigitalProduct:
      type: object
      required: [id, title, description, category, priceDalasi, downloads, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        category: { type: string }
        priceDalasi: { type: integer }
        downloads: { type: integer }
        createdAt: { type: string, format: date-time }
    DigitalProductInput:
      type: object
      required: [title, priceDalasi]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string }
        priceDalasi: { type: integer }

    # ---- Youth employment ----
    YouthEmploymentRecord:
      type: object
      required: [id, fullName, email, phone, program, status, placementCompany, createdAt]
      properties:
        id: { type: integer }
        fullName: { type: string }
        email: { type: [string, 'null'] }
        phone: { type: [string, 'null'] }
        program: { type: string }
        status: { type: string }
        placementCompany: { type: [string, 'null'] }
        createdAt: { type: string, format: date-time }
    YouthEmploymentRecordInput:
      type: object
      required: [fullName]
      properties:
        fullName: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        program: { type: string }
    YouthEmploymentRecordUpdate:
      type: object
      properties:
        status: { type: string }
        placementCompany: { type: string }

    # ---- Prospecting ----
    ProspectLead:
      type: object
      required: [id, name, email, phone, source, interest, status, notes, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: [string, 'null'] }
        phone: { type: [string, 'null'] }
        source: { type: string }
        interest: { type: string }
        status: { type: string }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
    ProspectLeadInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        source: { type: string }
        interest: { type: string }
        notes: { type: string }
    ProspectLeadUpdate:
      type: object
      properties:
        status: { type: string }
        notes: { type: string }

    # ---- Intranet ----
    InternalMessage:
      type: object
      required: [id, senderId, mailbox, subject, body, isRead, sentAt]
      properties:
        id: { type: integer }
        senderId: { type: string }
        mailbox: { type: string }
        subject: { type: string }
        body: { type: string }
        isRead: { type: boolean }
        sentAt: { type: string, format: date-time }
    InternalMessageInput:
      type: object
      required: [senderId, mailbox, subject]
      properties:
        senderId: { type: string }
        mailbox: { type: string }
        subject: { type: string, minLength: 1 }
        body: { type: string }
    InternalTicket:
      type: object
      required: [id, createdBy, department, subject, description, status, priority, createdAt, updatedAt]
      properties:
        id: { type: integer }
        createdBy: { type: string }
        department: { type: string }
        subject: { type: string }
        description: { type: string }
        status: { type: string }
        priority: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    InternalTicketInput:
      type: object
      required: [createdBy, subject]
      properties:
        createdBy: { type: string }
        department: { type: string }
        subject: { type: string, minLength: 1 }
        description: { type: string }
        priority: { type: string }
    InternalTicketUpdate:
      type: object
      properties:
        status: { type: string }
        priority: { type: string }
        department: { type: string }

    # ---- Treasury ----
    TreasuryAccount:
      type: object
      required: [id, name, currency, type, balance, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        currency: { type: string }
        type: { type: string }
        balance: { type: number }
        createdAt: { type: string, format: date-time }
    TreasuryTransaction:
      type: object
      required: [id, accountId, type, amount, category, description, relatedPaymentId, createdAt]
      properties:
        id: { type: integer }
        accountId: { type: integer }
        type: { type: string }
        amount: { type: number }
        category: { type: string }
        description: { type: string }
        relatedPaymentId: { type: [integer, 'null'] }
        createdAt: { type: string, format: date-time }
    TreasuryReserve:
      type: object
      required: [id, asOfDate, usdReserve, reserveRatio, createdAt]
      properties:
        id: { type: integer }
        asOfDate: { type: string }
        usdReserve: { type: number }
        reserveRatio: { type: number }
        createdAt: { type: string, format: date-time }
    LiquiditySnapshot:
      type: object
      required: [id, asOfDate, usdBalance, gmdBalance, projectedOutflowGmd, status, createdAt]
      properties:
        id: { type: integer }
        asOfDate: { type: string }
        usdBalance: { type: number }
        gmdBalance: { type: number }
        projectedOutflowGmd: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    CurrencyRate:
      type: object
      required: [id, baseCurrency, quoteCurrency, rate, asOf]
      properties:
        id: { type: integer }
        baseCurrency: { type: string }
        quoteCurrency: { type: string }
        rate: { type: number }
        asOf: { type: string, format: date-time }
    TreasuryAuditLog:
      type: object
      required: [id, actorId, action, entityType, entityId, details, createdAt]
      properties:
        id: { type: integer }
        actorId: { type: [string, 'null'] }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        details: { type: string }
        createdAt: { type: string, format: date-time }
    TreasuryOverview:
      type: object
      required: [totalUsdReserve, totalGmdOperational, reserveRatio, ususuRevenueToDateGmd, pendingSettlementsTotal, openRiskEvents, recentTransactions]
      properties:
        totalUsdReserve: { type: number }
        totalGmdOperational: { type: number }
        reserveRatio: { type: number }
        ususuRevenueToDateGmd: { type: number }
        pendingSettlementsTotal: { type: number }
        openRiskEvents: { type: integer }
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/TreasuryTransaction"

    # ---- Risk ----
    RiskEvent:
      type: object
      required: [id, type, severity, description, status, detectedAt, resolvedAt]
      properties:
        id: { type: integer }
        type: { type: string }
        severity: { type: string }
        description: { type: string }
        status: { type: string }
        detectedAt: { type: string, format: date-time }
        resolvedAt: { type: [string, 'null'], format: date-time }
    RiskEventInput:
      type: object
      required: [type, description]
      properties:
        type: { type: string }
        severity: { type: string }
        description: { type: string, minLength: 1 }
    RiskEventUpdate:
      type: object
      properties:
        status: { type: string }
        severity: { type: string }
        resolvedAt: { type: [string, 'null'], format: date-time }

    # ---- Settlement ----
    SettlementObligation:
      type: object
      required: [id, payeeType, payeeName, amount, currency, dueDate, status, createdAt]
      properties:
        id: { type: integer }
        payeeType: { type: string }
        payeeName: { type: string }
        amount: { type: number }
        currency: { type: string }
        dueDate: { type: string }
        status: { type: string }
        createdAt: { type: string, format: date-time }
    SettlementObligationInput:
      type: object
      required: [payeeType, payeeName, amount, dueDate]
      properties:
        payeeType: { type: string }
        payeeName: { type: string, minLength: 1 }
        amount: { type: number }
        currency: { type: string }
        dueDate: { type: string }
    SettlementObligationUpdate:
      type: object
      properties:
        status: { type: string }
        amount: { type: number }
        dueDate: { type: string }

    # ---- Dashboards ----
    MemberDashboard:
      type: object
      required: [memberships, assetsCount, ridesCount, unreadMessages, openTickets, recentPayments]
      properties:
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        assetsCount: { type: integer }
        ridesCount: { type: integer }
        unreadMessages: { type: integer }
        openTickets: { type: integer }
        recentPayments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"
    AdminDashboard:
      type: object
      required:
        [
          totalMembers,
          activeMemberships,
          pendingMemberships,
          totalAssets,
          totalLandListings,
          totalConstructionProjects,
          activeDrivers,
          ridesInProgress,
          ridesCompletedToday,
          marketplaceListings,
          digitalProductSales,
          youthPlacements,
          openTickets,
          newLeads,
          treasury,
        ]
      properties:
        totalMembers: { type: integer }
        activeMemberships: { type: integer }
        pendingMemberships: { type: integer }
        totalAssets: { type: integer }
        totalLandListings: { type: integer }
        totalConstructionProjects: { type: integer }
        activeDrivers: { type: integer }
        ridesInProgress: { type: integer }
        ridesCompletedToday: { type: integer }
        marketplaceListings: { type: integer }
        digitalProductSales: { type: integer }
        youthPlacements: { type: integer }
        openTickets: { type: integer }
        newLeads: { type: integer }
        treasury:
          $ref: "#/components/schemas/TreasuryOverview"
